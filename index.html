      const [gPaceTracked, setGPaceTracked] = useState(false);
      const [gLabel, setGLabel] = useState("");

      function openAdd() {
        setGType("total"); setGScope("year"); setGTarget(""); setGGenre(""); setGFormat("Paperback");
        setGBookId(""); setGBookSearch(""); setGDeadlineMonth(""); setGMonth(String(currentMonth));
        setGPaceTracked(false); setGLabel(""); setEditGoal(null); setShowAddGoal(true);
      }
      function openEdit(goal) {
        setGType(goal.type); setGScope(goal.scope||"year"); setGTarget(String(goal.target||""));
        setGGenre(goal.genre||""); setGFormat(goal.format||"Paperback");
        setGBookId(goal.bookId||""); setGBookSearch("");
        setGDeadlineMonth(String(goal.deadlineMonth||"")); setGMonth(String(goal.month||currentMonth));
        setGPaceTracked(!!goal.paceTracked); setGLabel(goal.label||""); setEditGoal(goal);
        setShowAddGoal(true);
      }

      function handleSaveGoal() {
        if (gType !== "book" && (!gTarget || isNaN(gTarget) || +gTarget < 1)) {
          alert("Please enter a valid target number."); return;
        }
        if (gType === "genre" && !gGenre) { alert("Please select a genre."); return; }
        if (gType === "book" && !gBookId) { alert("Please select a book."); return; }
        const goal = {
          id: editGoal?.id || `g_${Date.now()}`,
          year: selectedYear,
          type: gType,
          scope: gType === "book" ? "deadline" : gScope,
          target: gType === "book" ? 1 : +gTarget,
          genre: gType === "genre" ? gGenre : null,
          format: gType === "format" ? gFormat : null,
          bookId: gType === "book" ? gBookId : null,
          deadlineMonth: gType === "book" ? (+gDeadlineMonth||null) : null,
          month: gScope === "month" ? +gMonth : null,
          paceTracked: gType !== "book" && gPaceTracked,
          label: gLabel.trim() || null,
        };
        onSaveGoal(goal);
        setShowAddGoal(false);
      }

      const allGenres = [...new Set(db.books.map(b=>b.genre).filter(Boolean))].sort();
      const filteredBooks = db.books.filter(b =>
        b.title.toLowerCase().includes(gBookSearch.toLowerCase())
      ).slice(0,6);
      const selectedBookObj = db.books.find(b=>b.id===gBookId);

      return <div>
        {/* Year selector */}
        <div style={{ display:"flex", gap:7, marginBottom:20, flexWrap:"wrap", alignItems:"center" }}>
          <div style={{ fontFamily:"'EB Garamond',serif", fontSize:18, fontWeight:700, color:T.textDark, marginRight:4 }}>
            Pledges for
          </div>
          {goalYears.map(y=>(
            <button key={y} onClick={()=>setSelectedYear(y)}
              style={{ padding:"5px 14px", borderRadius:20, border:"none", cursor:"pointer",
                fontSize:12, fontWeight:600,
                background:selectedYear===y?T.base:T.card, color:selectedYear===y?T.navText:T.textMid,
                border:`1px solid ${selectedYear===y?T.base:T.border}` }}>{y}</button>
          ))}
          <Btn variant="accent" size="sm" onClick={openAdd} style={{ marginLeft:"auto" }}>+ New Pledge</Btn>
        </div>

        {/* Goal cards */}
        {yearGoals.length === 0 ? (
          <div style={{ textAlign:"center", padding:"50px 20px", color:T.muted }}>
            <div style={{ fontSize:36, marginBottom:10 }}>📜</div>
            <div style={{ fontSize:15, color:T.textMid, marginBottom:6 }}>No pledges for {selectedYear}</div>
            <div style={{ fontSize:13 }}>Tap "+ New Pledge" to set a reading goal</div>
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {yearGoals.map(goal=>{
              const pm = goal.scope === "month" ? goal.month : currentMonth;
              const prog = goalProgress(goal, db, selectedYear, pm);
              const pct = goal.type === "book" ? (prog.done ? 100 : 0) : Math.min(100, Math.round((prog.current/prog.target)*100));
              const pace = paceStatus(goal, prog.current, selectedYear, pm);
              const isOverdue = goal.type === "book" && !prog.done && goal.deadlineMonth &&
                (selectedYear < currentYear || (selectedYear === currentYear && goal.deadlineMonth < currentMonth));
              const isDone = pct === 100;

              let goalDesc = "";
              if (goal.type === "total") goalDesc = `Read ${goal.target} books`;
              if (goal.type === "genre") goalDesc = `Read ${goal.target} ${goal.genre} books`;
              if (goal.type === "format") goalDesc = `Read ${goal.target} books via ${goal.format}`;
              if (goal.type === "book") goalDesc = prog.book?.title || "Unknown book";

              const scopeLabel = goal.scope === "month" ? MONTHS_FULL[goal.month-1] :
                goal.scope === "deadline" && goal.deadlineMonth ? `by ${MONTHS[goal.deadlineMonth-1]}` : "Year";

              return (
                <div key={goal.id} style={{ background:T.card, border:`1px solid ${isOverdue?"#FECACA":isDone?"#6EE7B7":T.border}`,
                  borderRadius:10, padding:16, position:"relative" }}>
                  {/* Header */}
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                    <div style={{ flex:1 }}>
                      {goal.label && <div style={{ fontSize:10, fontWeight:600, color:T.muted, letterSpacing:"0.07em", marginBottom:3 }}>{goal.label.toUpperCase()}</div>}
                      <div style={{ fontFamily:"'EB Garamond',serif", fontSize:17, fontWeight:700, color:T.textDark, lineHeight:1.3 }}>{goalDesc}</div>
                      <div style={{ fontSize:11, color:T.muted, marginTop:3 }}>{scopeLabel} · {selectedYear}</div>
                    </div>
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      {isOverdue && <Badge label="OVERDUE" color="#DC2626" bg="#FEF2F2" border="#FECACA" size={9} />}
                      {isDone && <Badge label="DONE ✓" color="#059669" bg="#ECFDF5" border="#6EE7B7" size={9} />}
                      <button onClick={()=>openEdit(goal)}
                        style={{ fontSize:11, padding:"4px 10px", border:`1px solid ${T.border}`,
                          borderRadius:6, background:T.surface, color:T.textMid, cursor:"pointer" }}>Edit</button>
                      <button onClick={()=>onDeleteGoal(goal.id)}
                        style={{ fontSize:11, padding:"4px 10px", border:"1px solid #FECACA",
                          borderRadius:6, background:"#FEF2F2", color:T.error, cursor:"pointer" }}>✕</button>
                    </div>
                  </div>

                  {/* Progress bar */}
                  {goal.type !== "book" && (
                    <>
                      <div style={{ height:8, borderRadius:4, background:T.surface, overflow:"hidden", marginBottom:6 }}>
                        <div style={{ height:"100%", borderRadius:4,
                          background: isDone ? "#059669" : pace?.color || T.accent,
                          width:`${pct}%`, transition:"width 0.4s" }} />
                      </div>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ fontSize:11, color:T.muted }}>{prog.current} of {prog.target} books · {pct}%</span>
                        {pace && <span style={{ fontSize:11, fontWeight:600, color:pace.color }}>{pace.label}</span>}
                      </div>
                    </>
                  )}
                  {goal.type === "book" && (
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ width:4, height:32, borderRadius:2, background:prog.done?"#059669":"#E2E8F0" }} />
                      <div style={{ fontSize:13, color:T.textMid }}>
                        {prog.done ? "Finished ✓" : isOverdue ? "Overdue — not yet read" : "Not yet read"}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Add/Edit Goal Sheet */}
        {showAddGoal && (
          <div style={{ position:"fixed", inset:0, zIndex:100, display:"flex", flexDirection:"column" }}>
            <div onClick={()=>setShowAddGoal(false)} style={{ flex:1, background:"rgba(0,0,0,0.45)" }} />
            <div style={{ background:T.surface, borderRadius:"16px 16px 0 0", maxHeight:"90vh",
              overflowY:"auto", animation:"slideUp 0.25s ease" }}>
              <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 4px" }}>
                <div style={{ width:36, height:4, borderRadius:2, background:T.border }} />
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                padding:"8px 20px 14px", borderBottom:`1px solid ${T.border}` }}>
                <div style={{ fontFamily:"'EB Garamond',serif", fontSize:18, fontWeight:700, color:T.textDark }}>
                  {editGoal ? "Edit Pledge" : "New Pledge"}
                </div>
                <Btn onClick={()=>setShowAddGoal(false)} variant="secondary" size="sm">✕</Btn>
              </div>
              <div style={{ padding:20 }}>
                {/* Optional label */}
                <div style={{ marginBottom:14 }}>
                  <FieldLabel label="Label (optional)" />
                  <input value={gLabel} onChange={e=>setGLabel(e.target.value)}
                    placeholder="e.g. Summer reading, Fiction challenge…"
                    style={{ width:"100%", padding:"10px 12px", border:`1px solid ${T.border}`,
                      borderRadius:8, fontSize:14, color:T.textDark, outline:"none", background:T.card }} />
                </div>

                {/* Goal type */}
                <div style={{ marginBottom:14 }}>
                  <FieldLabel label="Goal type" required />
                  <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                    {GOAL_TYPES.map(t=>(
                      <div key={t.key} onClick={()=>setGType(t.key)}
                        style={{ padding:"7px 14px", borderRadius:20, cursor:"pointer", fontSize:12, fontWeight:600,
                          background:gType===t.key?T.base:T.card, color:gType===t.key?T.navText:T.textMid,
                          border:`1.5px solid ${gType===t.key?T.base:T.border}` }}>{t.label}</div>
                    ))}
                  </div>
                </div>

                {/* Scope (not for book type) */}
                {gType !== "book" && (
                  <div style={{ marginBottom:14 }}>
                    <FieldLabel label="Scope" required />
                    <div style={{ display:"flex", gap:7 }}>
                      {GOAL_SCOPES.map(s=>(
                        <div key={s.key} onClick={()=>setGScope(s.key)}
                          style={{ padding:"7px 14px", borderRadius:20, cursor:"pointer", fontSize:12, fontWeight:600,
                            background:gScope===s.key?T.base:T.card, color:gScope===s.key?T.navText:T.textMid,
                            border:`1.5px solid ${gScope===s.key?T.base:T.border}` }}>{s.label}</div>
                      ))}
                    </div>
                    {gScope === "month" && (
                      <select value={gMonth} onChange={e=>setGMonth(e.target.value)}
                        style={{ marginTop:8, width:"100%", padding:"10px 12px", border:`1px solid ${T.border}`,
                          borderRadius:8, fontSize:14, color:T.textDark, outline:"none", background:T.card, appearance:"none" }}>
                        {MONTHS_FULL.map((m,i)=><option key={m} value={i+1}>{m}</option>)}
                      </select>
                    )}
                  </div>
                )}

                {/* Target number */}
                {gType !== "book" && (
                  <div style={{ marginBottom:14 }}>
                    <FieldLabel label="Target (number of books)" required />
                    <input value={gTarget} onChange={e=>setGTarget(e.target.value)} type="number" min="1"
                      placeholder="e.g. 20"
                      style={{ width:"100%", padding:"10px 12px", border:`1px solid ${T.border}`,
                        borderRadius:8, fontSize:14, color:T.textDark, outline:"none", background:T.card }} />
                  </div>
                )}

                {/* Genre picker */}
                {gType === "genre" && (
                  <div style={{ marginBottom:14 }}>
                    <FieldLabel label="Genre" required />
                    <select value={gGenre} onChange={e=>setGGenre(e.target.value)}
                      style={{ width:"100%", padding:"10px 12px", border:`1px solid ${T.border}`,
                        borderRadius:8, fontSize:14, color:gGenre?T.textDark:T.muted, outline:"none", background:T.card, appearance:"none" }}>
                      <option value="">Select a genre…</option>
                      {allGenres.map(g=><option key={g} value={g}>{g}</option>)}
                    </select>
                  </div>
                )}

                {/* Format picker */}
                {gType === "format" && (
                  <div style={{ marginBottom:14 }}>
                    <FieldLabel label="Format" required />
                    <select value={gFormat} onChange={e=>setGFormat(e.target.value)}
                      style={{ width:"100%", padding:"10px 12px", border:`1px solid ${T.border}`,
                        borderRadius:8, fontSize:14, color:T.textDark, outline:"none", background:T.card, appearance:"none" }}>
                      {Object.keys(FORMAT_COLORS).map(f=><option key={f} value={f}>{f}</option>)}
                    </select>
                  </div>
                )}

                {/* Book picker */}
                {gType === "book" && (
                  <div style={{ marginBottom:14 }}>
                    <FieldLabel label="Book" required />
                    {selectedBookObj ? (
                      <div style={{ display:"flex", alignItems:"center", gap:8, background:"#EFF6FF",
                        border:"1px solid #BFDBFE", borderRadius:8, padding:"10px 12px", marginBottom:8 }}>
                        <span style={{ fontSize:13, color:T.accent, flex:1 }}>{selectedBookObj.title}</span>
                        <span onClick={()=>{ setGBookId(""); setGBookSearch(""); }}
                          style={{ cursor:"pointer", color:T.muted, fontSize:14 }}>×</span>
                      </div>
                    ) : (
                      <>
                        <input value={gBookSearch} onChange={e=>setGBookSearch(e.target.value)}
                          placeholder="Search books…"
                          style={{ width:"100%", padding:"10px 12px", border:`1px solid ${T.border}`,
                            borderRadius: gBookSearch ? "8px 8px 0 0" : 8,
                            fontSize:14, color:T.textDark, outline:"none", background:T.card }} />
                        {gBookSearch && (
                          <div style={{ border:`1px solid ${T.border}`, borderTop:"none",
                            borderRadius:"0 0 8px 8px", background:T.card, maxHeight:160, overflowY:"auto" }}>
                            {filteredBooks.map(b=>(
                              <div key={b.id} onClick={()=>{ setGBookId(b.id); setGBookSearch(""); }}
                                style={{ padding:"9px 12px", cursor:"pointer", fontSize:13, color:T.textMid,
                                  borderBottom:`1px solid ${T.border}` }}>{b.title}</div>
                            ))}
                          </div>
                        )}
                      </>
                    )}
                    {/* Deadline month */}
                    <div style={{ marginTop:10 }}>
                      <FieldLabel label="Deadline (optional)" />
                      <select value={gDeadlineMonth} onChange={e=>setGDeadlineMonth(e.target.value)}
                        style={{ width:"100%", padding:"10px 12px", border:`1px solid ${T.border}`,
                          borderRadius:8, fontSize:14, color:gDeadlineMonth?T.textDark:T.muted,
                          outline:"none", background:T.card, appearance:"none" }}>
                        <option value="">No deadline</option>
                        {MONTHS_FULL.map((m,i)=><option key={m} value={i+1}>{m} {selectedYear}</option>)}
                      </select>
                    </div>
                  </div>
                )}

                {/* Pace tracking toggle */}
                {gType !== "book" && (
                  <div style={{ marginBottom:20 }}>
                    <Toggle label="Track pace (show ahead / behind)" value={gPaceTracked} onChange={setGPaceTracked} />
                    <div style={{ fontSize:11, color:T.muted, marginTop:5 }}>
                      Pace tracking only shows status for the current year/month.
                    </div>
                  </div>
                )}

                <Btn onClick={handleSaveGoal} variant="primary" size="lg">{editGoal?"Save Changes":"Add Pledge"}</Btn>
              </div>
            </div>
          </div>
        )}
      </div>;
    }

    // ── AUTHORS ────────────────────────────────────────────────────────────────

    function AuthorsScreen({ db, onSelectBook, onImport, onExport, onReset }) {
      const [search, setSearch] = useState("");
      const [showTools, setShowTools] = useState(false);
      const filtered = db.authors.filter(a=>a.name.toLowerCase().includes(search.toLowerCase()));
      const fileInputRef = useRef(null);

      return <div>
        <div style={{ display:"flex", alignItems:"center", gap:10, background:T.card,
          border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", marginBottom:12 }}>
          <span style={{ color:T.muted, fontSize:16 }}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search authors…"
            style={{ flex:1, border:"none", outline:"none", fontSize:14, color:T.textDark, background:"transparent" }} />
        </div>

        {/* Data tools */}
        <div style={{ marginBottom:16 }}>
          <button onClick={()=>setShowTools(s=>!s)}
            style={{ width:"100%", padding:"9px 14px", borderRadius:8, border:`1px solid ${T.border}`,
              background:T.card, fontSize:12, fontWeight:600, color:T.textMid, cursor:"pointer",
              display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span>⚙️ Data Tools (Import / Export)</span>
            <span>{showTools?"▲":"▼"}</span>
          </button>
          {showTools && (
            <div style={{ background:T.card, border:`1px solid ${T.border}`, borderTop:"none",
              borderRadius:"0 0 8px 8px", padding:14, display:"flex", flexDirection:"column", gap:8 }}>
              <input ref={fileInputRef} type="file" accept="application/json" style={{ display:"none" }}
                onChange={e=>{
                  const file = e.target.files[0];
                  if (!file) return;
                  const reader = new FileReader();
                  reader.onload = ev => {
                    try {
                      const json = JSON.parse(ev.target.result);
                      onImport(json);
                    } catch (err) {
                      alert("Invalid file. Please select a valid Bookshelf JSON export.");
                    }
                  };
                  reader.readAsText(file);
                  e.target.value = "";
                }} />
              <Btn variant="accent" onClick={()=>fileInputRef.current.click()}>📥 Import from JSON file</Btn>
              <Btn variant="secondary" onClick={onExport}>📤 Export library to JSON</Btn>
              <Btn variant="danger" onClick={onReset}>🗑️ Reset all data</Btn>
              <div style={{ fontSize:11, color:T.muted, lineHeight:1.5 }}>
                Import replaces your entire library with the contents of the file.
                Export downloads a backup you can re-import later or move to another device.
              </div>
            </div>
          )}
        </div>
        {filtered.length===0
          ? <div style={{ textAlign:"center", padding:"50px 20px", color:T.muted }}>
              <div style={{ fontSize:36, marginBottom:10 }}>✍️</div>
              <div style={{ fontSize:14, color:T.textMid }}>No authors yet</div>
              <div style={{ fontSize:12, marginTop:4 }}>Authors are added when you add books</div>
            </div>
          : <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
              {filtered.map(author=>{
                const books = db.books.filter(b=>(b.authorIds||[]).includes(author.id));
                const readCount = books.filter(b=>b.status==="Read").length;
                return <div key={author.id} style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"14px 16px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom: books.length?10:0 }}>
                    <div>
                      <div style={{ fontFamily:"'EB Garamond',serif", fontSize:16, fontWeight:700, color:T.textDark }}>{author.name}</div>
                      <div style={{ fontSize:12, color:T.muted, marginTop:2 }}>{books.length} {books.length===1?"book":"books"} · {readCount} read</div>
                    </div>
                    {readCount>0 && <Badge label={`${readCount} READ`} color="#059669" bg="#ECFDF5" border="#6EE7B7" size={10} />}
                  </div>
                  {books.length>0 && <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                    {books.map(book=>(
                      <div key={book.id} onClick={()=>onSelectBook(book)}
                        style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px",
                          background:T.surface, border:`1px solid ${T.border}`, borderRadius:7, cursor:"pointer" }}>
                        <div style={{ width:3, height:20, borderRadius:2, background:spineColor(book.id), flexShrink:0 }} />
                        <div style={{ flex:1, fontSize:13, color:T.textMid }}>{book.title}</div>
                        <Badge label={book.status} {...(STATUS_COLORS[book.status]||{})} size={9} />
                      </div>
                    ))}
                  </div>}
                </div>;
              })}
            </div>
        }
      </div>;
    }

    // ── ROOT APP ───────────────────────────────────────────────────────────────
    function App() {
      const [db, setDb] = useState(()=>loadDB());
      const [nav, setNav] = useState("Library");
      const [selectedBook, setSelectedBook] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [toast, setToast] = useState(null);

      useEffect(()=>{ saveDB(db); },[db]);

      function showToast(msg, type="success") {
        setToast({msg,type});
        setTimeout(()=>setToast(null),2500);
      }

      function saveBook(form) {
        setDb(prev=>{
          let authors=[...prev.authors], nextAuthorId=prev.nextAuthorId;
          const resolvedIds = form.authorIds.map(id=>{
            if (!id.startsWith("__new__")) return id;
            const name=id.replace("__new__","");
            const ex=authors.find(a=>a.name.toLowerCase()===name.toLowerCase());
            if (ex) return ex.id;
            const newId=`a_${nextAuthorId++}`;
            authors.push({id:newId,name});
            return newId;
          });

          // Resolve new series
          let seriesList=[...prev.series], nextSeriesId=prev.nextSeriesId||1;
          let resolvedSeriesId = form.seriesId;
          if (form.seriesId && typeof form.seriesId === "string" && form.seriesId.startsWith("__newseries__")) {
            const parts = form.seriesId.replace("__newseries__","").split("__");
            const name = parts[0];
            const totalCount = parts[1] ? parseInt(parts[1]) : null;
            const ex = seriesList.find(s=>s.name.toLowerCase()===name.toLowerCase());
            if (ex) {
              resolvedSeriesId = ex.id;
            } else {
              const newId = `s_${nextSeriesId++}`;
              seriesList.push({ id:newId, name, totalCount: totalCount||null });
              resolvedSeriesId = newId;
            }
          }

          const bookData={...form, authorIds:resolvedIds, seriesId:resolvedSeriesId,
            seriesPosition: form.seriesPosition ? parseInt(form.seriesPosition) : null };
          let books, nextBookId=prev.nextBookId;
          if (bookData.id) {
            books=prev.books.map(b=>b.id===bookData.id?bookData:b);
          } else {
            const newId=`b_${nextBookId++}`;
            books=[...prev.books,{...bookData,id:newId}];
          }
          return{...prev,authors,books,series:seriesList,nextAuthorId,nextBookId,nextSeriesId};
        });
        setSelectedBook(null); setShowAdd(false);
        showToast(form.id?"Book updated!":"Book added!");
      }

      function deleteBook(book) {
        if (!window.confirm(`Delete "${book.title}"?`)) return;
        setDb(prev=>({...prev,books:prev.books.filter(b=>b.id!==book.id)}));
        setSelectedBook(null);
        showToast("Book deleted","info");
      }

      function importData(json) {
        if (!json || !Array.isArray(json.books) || !Array.isArray(json.authors)) {
          alert("This file doesn't look like a valid Bookshelf export.");
          return;
        }
        if (!window.confirm(`This will REPLACE your current library (${db.books.length} books) with ${json.books.length} books from the file. Continue?`)) return;
        setDb({
          authors: json.authors,
          books: json.books,
          nextAuthorId: json.nextAuthorId || (json.authors.length + 1),
          nextBookId: json.nextBookId || (json.books.length + 1),
        });
        showToast(`Imported ${json.books.length} books!`);
      }

      function exportData() {
        const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `bookshelf-backup-${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("Library exported!");
      }

      function resetData() {
        if (!window.confirm("This will DELETE all books and authors permanently. Are you sure?")) return;
        setDb(EMPTY_DB);
        showToast("All data cleared","info");
      }

      const NAV=[{key:"Stacks",label:"Stacks"},{key:"Almanac",label:"Almanac"},{key:"Pledges",label:"Pledges"},{key:"Acquire",label:"Acquire"},{key:"Scribes",label:"Scribes"}];

      const [pendingGenreFilter, setPendingGenreFilter] = useState(null);

      function saveGoal(goal) {
        setDb(prev=>{
          const goals = prev.goals||[];
          const exists = goals.find(g=>g.id===goal.id);
          return { ...prev, goals: exists ? goals.map(g=>g.id===goal.id?goal:g) : [...goals,goal] };
        });
        showToast(goal.id?"Pledge updated!":"Pledge added!");
      }

      function deleteGoal(goalId) {
        if (!window.confirm("Delete this pledge?")) return;
        setDb(prev=>({ ...prev, goals:(prev.goals||[]).filter(g=>g.id!==goalId) }));
        showToast("Pledge deleted","info");
      }

      return <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:T.surface }}>
        {/* Header */}
        <div style={{ background:T.base, padding:"14px 20px 12px", flexShrink:0,
          paddingTop:"max(14px, env(safe-area-inset-top))" }}>
          <div style={{ fontFamily:"'EB Garamond',serif", fontSize:26, fontWeight:700, color:T.navText, letterSpacing:"0.01em" }}>Bibliotheca</div>
          <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>{db.books.length} books tracked</div>
        </div>

        {/* Scrollable body */}
        <div style={{ flex:1, overflowY:"auto", padding:"18px 16px 20px" }}>
          {nav==="Stacks"   && <LibraryScreen db={db} onSelectBook={setSelectedBook}
            externalGenreFilter={pendingGenreFilter}
            onClearExternalGenreFilter={()=>setPendingGenreFilter(null)} />}
          {nav==="Almanac"  && <DashboardScreen db={db} />}
          {nav==="Pledges"  && <PledgesScreen db={db} onSaveGoal={saveGoal} onDeleteGoal={deleteGoal} />}
          {nav==="Scribes"  && <AuthorsScreen db={db} onSelectBook={setSelectedBook}
            onImport={importData} onExport={exportData} onReset={resetData} />}
        </div>

        {/* Bottom nav */}
        <div style={{ background:T.base, flexShrink:0,
          paddingBottom:"max(10px, env(safe-area-inset-bottom))",
          borderTop:"1px solid rgba(255,255,255,0.07)" }}>
          <div style={{ display:"flex" }}>
            {NAV.map(item=>{
              const isAdd=item.key==="Acquire";
              const active=!isAdd&&nav===item.key;
              return <button key={item.key}
                onClick={()=>{ if (isAdd) setShowAdd(true); else setNav(item.key); }}
                style={{ flex:1, padding:"12px 4px 10px", border:"none",
                  background:"transparent", cursor:"pointer",
                  display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
                <span style={{ fontFamily:"'EB Garamond',serif", fontSize:12, fontWeight:active||isAdd?700:400,
                  letterSpacing:"0.05em", fontStyle:isAdd?"italic":"normal",
                  color:active||isAdd?"#FFF":"rgba(255,255,255,0.4)" }}>{item.label}</span>
                <div style={{ width:active?14:4, height:3, borderRadius:2,
                  background:active?T.accent:isAdd?"rgba(255,255,255,0.25)":"transparent",
                  transition:"width 0.2s" }} />
              </button>;
            })}
          </div>
        </div>

        {/* Sheets */}
        {selectedBook && <BookSheet book={selectedBook} allAuthors={db.authors} allSeries={db.series}
          onClose={()=>setSelectedBook(null)} onSave={saveBook} onDelete={()=>deleteBook(selectedBook)} />}
        {showAdd && <BookSheet book={{}} allAuthors={db.authors} allSeries={db.series}
          onClose={()=>setShowAdd(false)} onSave={saveBook} onDelete={()=>{}} />}

        {/* Toast */}
        {toast && <div style={{ position:"fixed", top:80, left:"50%", transform:"translateX(-50%)",
          background:toast.type==="success"?"#059669":toast.type==="info"?T.accent:T.error,
          color:"#FFF", padding:"10px 20px", borderRadius:24, fontSize:13, fontWeight:600,
          boxShadow:"0 4px 16px rgba(0,0,0,0.2)", zIndex:200, animation:"fadeInDown 0.2s ease",
          whiteSpace:"nowrap" }}>{toast.msg}</div>}
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- PWA Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
